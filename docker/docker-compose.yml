version: "3.9"

services:
  # ── Agent Server (FastAPI) ──────────────────────────────────────────────────
  agent-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fecmall-agent-server
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - MILVUS_URI=http://milvus-standalone:19530
      - FECMALL_BASE_URL=${FECMALL_BASE_URL:-http://host.docker.internal/appserver}
    volumes:
      - agent-data:/app/data
      - agent-logs:/app/logs
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fecmall-net

  # ── Weather MCP Server ─────────────────────────────────────────────────────
  weather-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: fecmall-weather-mcp
    ports:
      - "8001:8001"
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    restart: unless-stopped
    networks:
      - fecmall-net

  # ── Milvus etcd ────────────────────────────────────────────────────────────
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: fecmall-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: >
      etcd
        --advertise-client-urls=http://127.0.0.1:2379
        --listen-client-urls=http://0.0.0.0:2379
        --data-dir=/etcd
        --initial-cluster-token=etcd-cluster
    restart: unless-stopped
    networks:
      - fecmall-net

  # ── Milvus MinIO ───────────────────────────────────────────────────────────
  milvus-minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: fecmall-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - fecmall-net

  # ── Milvus Standalone ──────────────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.17
    container_name: fecmall-milvus-standalone
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      - milvus-etcd
      - milvus-minio
    restart: unless-stopped
    networks:
      - fecmall-net

volumes:
  agent-data:
  agent-logs:
  etcd-data:
  minio-data:
  milvus-data:

networks:
  fecmall-net:
    driver: bridge
